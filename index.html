<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Proverb Generator</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 20px;
      text-align: center;
    }
    #proverb {
      font-size: 1.4rem;
      margin: 40px 0;
      line-height: 1.6;
    }
    button {
      font-size: 1rem;
      padding: 10px 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Random Proverb Generator</h1>
  <p id="proverb"></p>
  <button id="btn">Show another proverb</button>

  <script>
    const proverbs = [
      "A journey of a thousand miles begins with a single step.",
      "Actions speak louder than words.",
      "The early bird catches the worm.",
      "When in Rome, do as the Romans do.",
      "Fortune favors the bold.",
      "Necessity is the mother of invention.",
      "The pen is mightier than the sword.",
      "Two heads are better than one.",
      "Where there's a will, there's a way.",
      "Still waters run deep.",
    ];

    function showProverb() {
      const el = document.getElementById("proverb");
      let next;
      do {
        next = proverbs[Math.floor(Math.random() * proverbs.length)];
      } while (proverbs.length > 1 && next === el.textContent);
      el.textContent = next;
    }

    showProverb();
    document.getElementById("btn").addEventListener("click", showProverb);
  </script>
</body>
</html>
